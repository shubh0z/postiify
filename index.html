<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>postiiify – Anime Shop</title>
  
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Noto+Sans+JP:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- NOISE OVERLAY -->
  <div class="noise"></div>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-jp">ポスティファイ</span>
        <span class="logo-en">postiiify</span>
      </div>
      <button class="cart-btn" onclick="toggleCart()">
        <span class="cart-icon">🛒</span>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
    <div class="tagline">// anime posters & figures — straight from the collection //</div>
  </header>

  <!-- FILTER TABS -->
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterProducts('all', this)">ALL</button>
    <button class="filter-btn" onclick="filterProducts('poster', this)">POSTERS</button>
    <button class="filter-btn" onclick="filterProducts('figure', this)">FIGURES</button>
  </div>

  <!-- SEARCH BAR -->
  <div class="search-bar-wrap">
    <div class="search-inner">
      <span class="search-icon">🔍</span>
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Search posters, figures, series..."
        oninput="onSearchInput(this.value)"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="search-clear" id="searchClear" onclick="clearSearch()" style="display:none">✕</button>
    </div>
  </div>

  <!-- PRODUCTS GRID -->
  <main>
    <div class="grid" id="productGrid">
      <!-- Products injected by JS -->
    </div>
  </main>

  <!-- CART SIDEBAR -->
  <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
  <aside class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h2>YOUR CART <span class="jp-small">カート</span></h2>
      <button class="close-btn" onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems">
      <p class="empty-msg">Cart is empty~ 空っぽ</p>
    </div>
    <div class="cart-footer">
      <div class="cart-total">TOTAL: <span id="cartTotal">₹0</span></div>
      <button class="order-btn" onclick="orderOnInstagram()">
        <span>ORDER ON INSTAGRAM</span>
        <span class="ig-icon">📩</span>
      </button>
      <p class="order-note">You'll be redirected to Instagram DM with your order details!</p>
    </div>
  </aside>


  <!-- LIGHTBOX MODAL -->
  <div class="lb-overlay" id="lightbox" onclick="handleLbOverlayClick(event)">
    <div class="lb-modal" onclick="event.stopPropagation()">
      <button class="lb-close" onclick="closeLightbox()">✕</button>
      <div class="lb-viewport">
        <div class="lb-track" id="lbTrack"
          onscroll="lbTrackScroll()"
          ontouchstart="lbTouchStart(event)"
          ontouchend="lbTouchEnd(event)">
        </div>
        <button class="lb-arrow lb-arrow-prev" onclick="lbPrev()">&#8249;</button>
        <button class="lb-arrow lb-arrow-next" onclick="lbNext()">&#8250;</button>
        <div class="lb-counter" id="lbCounter"></div>
      </div>
      <div class="lb-dots" id="lbDots"></div>
      <div class="lb-info">
        <div class="lb-info-left">
          <div class="lb-title"></div>
          <div class="lb-series"></div>
        </div>
        <div class="lb-price"></div>
      </div>
      <button class="lb-add-btn add-btn" onclick="lbAddFromPopup()">+ ADD TO CART</button>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <a href="https://www.instagram.com/postiiify/" target="_blank" class="ig-link">
      <span>@postiiify</span> on Instagram
    </a>
    <p class="footer-note">DM us for custom orders & inquiries ✦</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
